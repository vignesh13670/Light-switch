<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESP32 Servo Switch (BLE)</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; max-width: 720px; margin: 28px auto; padding: 0 16px; }
    .card { border: 1px solid #ddd; border-radius: 14px; padding: 16px; margin: 12px 0; }
    button { padding: 12px 14px; border-radius: 12px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
    button.primary { background: #111; color: #fff; border: none; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
    .status { font-weight: 650; }
    .hint { color: #444; font-size: 14px; line-height: 1.4; }
    .log { font-family: ui-monospace, Menlo, monospace; white-space: pre-wrap; background: #f6f6f6; padding: 12px; border-radius: 14px; min-height: 90px; }

    .switch { position: relative; display: inline-block; width: 64px; height: 36px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background-color: #ccc; transition: .2s; border-radius: 999px; }
    .slider:before {
      position: absolute; content: "";
      height: 28px; width: 28px; left: 4px; top: 4px;
      background-color: white; transition: .2s; border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
    }
    input:checked + .slider { background-color: #111; }
    input:checked + .slider:before { transform: translateX(28px); }
  </style>
</head>

<body>
  <h1>ESP32 Servo Switch</h1>
  <p class="hint">
    Uses <b>Web Bluetooth (BLE)</b>. Best on <b>Chrome/Edge</b> (Android works best).
    This version filters devices by <code>SERVICE_UUID</code>.
  </p>

  <div class="card row">
    <div>
      <button id="btnConnect" class="primary">Connect</button>
      <button id="btnDisconnect" disabled>Disconnect</button>
    </div>
    <div class="status" id="status">Not connected</div>
  </div>

  <div class="card row">
    <div>
      <div style="font-weight:700;">Light Switch</div>
      <div class="hint">Toggle sends <code>ON</code> / <code>OFF</code></div>
    </div>

    <label class="switch">
      <input id="toggle" type="checkbox" disabled />
      <span class="slider"></span>
    </label>
  </div>

  <div class="card">
    <div style="font-weight:700; margin-bottom:8px;">Log</div>
    <div id="log" class="log"></div>
  </div>

<script>
  // Must match your ESP32 sketch
  const SERVICE_UUID = "12345678-1234-1234-1234-1234567890ab";
  const CHAR_UUID    = "abcd1234-1234-1234-1234-abcdef123456"; // writable characteristic

  let device = null;
  let writeChar = null;

  const $ = (id) => document.getElementById(id);

  function log(msg) {
    const el = $("log");
    el.textContent += msg + "\n";
    el.scrollTop = el.scrollHeight;
  }

  function setConnected(yes) {
    $("btnConnect").disabled = yes;
    $("btnDisconnect").disabled = !yes;
    $("toggle").disabled = !yes;
    $("status").textContent = yes ? `Connected: ${device?.name || "BLE device"}` : "Not connected";
  }

  async function connect() {
    try {
      log("Requesting BLE device...");

      // ✅ Filter by service UUID (your requested change)
      device = await navigator.bluetooth.requestDevice({
        filters: [{ services: [SERVICE_UUID] }]
      });

      device.addEventListener("gattserverdisconnected", () => {
        log("Disconnected");
        writeChar = null;
        setConnected(false);
      });

      log(`Selected: ${device.name || "(no name)"}`);
      const server = await device.gatt.connect();
      log("GATT connected");

      const service = await server.getPrimaryService(SERVICE_UUID);
      writeChar = await service.getCharacteristic(CHAR_UUID);

      log("Ready. Toggle ON/OFF.");
      setConnected(true);
    } catch (e) {
      log("❌ " + (e?.message || e));
      writeChar = null;
      setConnected(false);
    }
  }

  async function disconnect() {
    try {
      if (device?.gatt?.connected) device.gatt.disconnect();
    } finally {
      writeChar = null;
      setConnected(false);
    }
  }

  async function send(text) {
    if (!writeChar) {
      log("❌ Not connected");
      return;
    }
    try {
      await writeChar.writeValue(new TextEncoder().encode(text));
      log("➡️ " + text);
    } catch (e) {
      log("❌ Write failed: " + (e?.message || e));
    }
  }

  $("btnConnect").addEventListener("click", connect);
  $("btnDisconnect").addEventListener("click", disconnect);
  $("toggle").addEventListener("change", (e) => send(e.target.checked ? "ON" : "OFF"));

  if (!navigator.bluetooth) {
    $("status").textContent = "Web Bluetooth not supported in this browser.";
    $("btnConnect").disabled = true;
    log("Use Chrome/Edge (Android works best).");
  }
</script>
</body>
</html>
